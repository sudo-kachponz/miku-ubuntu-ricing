[main]
font=JetBrainsMono Nerd Font:size=14
# Memberikan sedikit jarak dari tepi layar agar persis seperti GNOME
pad=10x10 

[colors]
# --- KUNCI EFEK KACA NGEBLUR ---
# Tingkat transparansi (0.0 transparan total, 1.0 solid). 0.85 adalah titik paling pas untuk blur GNOME!
alpha=0.50
# Latar Belakang: Hitam/Abu-abu sangat gelap, BUKAN cyan. (Cyan-nya nanti di teks)
background=14151e
# Teks Dasar: Putih terang/Abu-abu
foreground=dbfff9

# --- WARNA BLOK FASTFETCH (Persis Screenshot Kanan) ---
# Baris Atas (Reguler)
regular0=073642  # Dark Slate
regular1=00ffff  # Cyan Terang
regular2=ff00b3  # Magenta
regular3=005f5f  # Dark Teal/Green
regular4=ff00ff  # Magenta
regular5=ff1493  # Deep Pink
regular6=008b8b  # Dark Cyan
regular7=008080  # Teal

# Baris Bawah (Terang/Bright)
bright0=f0e68c  # Khaki/Beige
bright1=00ffff  # Bright Cyan
bright2=ff00ff  # Bright Magenta
bright3=eedd82  # Light Yellow
bright4=ffff00  # Bright Yellow
bright5=ff69b4  # Hot Pink
bright6=40e0d0  # Turquoise
bright7=002b36  # Dark Base

# Warna untuk prompt dan teks terpilih
selection-background=39c5bb
selection-foreground=14151e
urls=39c5bb
