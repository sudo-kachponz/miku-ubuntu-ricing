# =====================================================================
# MASTER CONFIG V8: CUSTOM GRAPHIC PALETTE THEME - FIRANIA
# (POWERED BY CAELESTIA FLUID ANIMATIONS)
# =====================================================================

# --- SINKRONISASI JEMBATAN GRAFIS ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY XAUTHORITY
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY XAUTHORITY

# --- VARIABEL APLIKASI ---
$mainMod = SUPER
$terminal = foot
$fileManager = nautilus
$menu = wofi --show drun --allow-images

# --- TOMBOL PINTAS (KEYBINDS DASAR) ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu

# --- KONTROL MANAJEMEN JENDELA & MOUSE AJAIB ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- SEKTOR SCREENSHOT ---
bind = , PRINT, exec, hyprshot -m region --output-folder ~/Pictures/Screenshots --swappy
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +'%Y%m%d-%H%M%S').png | wl-copy

# --- PENGATURAN XWAYLAND & DEBUG ---
xwayland {
    force_zero_scaling = true
}

debug {
    error_position = 1
}

# --- SEKTOR MISC (CAELESTIA) ---
misc {
    vrr = 1
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    middle_click_paste = false
    focus_on_activate = true
    session_lock_xray = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    # Background diganti ke Dark Grey dari palet Miku
    background_color = rgb(373b3e) 
}

# --- SEKTOR TAMPILAN & BORDER (MIKU PALETTE) ---
# --- SEKTOR TAMPILAN, BORDER & LAYOUT (PURE CAELESTIA STYLE) ---
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 5

    layout = dwindle
    
    # INI DIA KUNCINYA: Mengaktifkan ubah ukuran dengan menarik pinggiran jendela
    resize_on_border = true 
    extend_border_grab_area = 15 # Memperlebar area klik agar lebih mudah ditarik

    col.active_border = rgba(e12885ff) rgba(137a7fff) rgba(86cecbff) 45deg
    col.inactive_border = rgba(373b3eee) 
}

# --- PENGATURAN LAYOUT DWINDLE (MANAJEMEN JENDELA LUWES) ---
dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = true # Membuat besar-kecil jendela pakai mouse jadi sangat responsif
}

# --- SEKTOR ESTETIKA, OPACITY & BLUR ---
decoration {
    rounding = 12
    active_opacity = 0.88
    inactive_opacity = 0.80

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        brightness = 0.30
        contrast = 1.4
    }
}

# --- SEKTOR ANIMASI FLUID (PURE CAELESTIA) ---
animations {
    enabled = true

    # Kurva animasi Caelestia
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = standard, 0.2, 0, 0, 1

    # Konfigurasi pergerakan Caelestia
    animation = layersIn, 1, 5, emphasizedDecel, slide
    animation = layersOut, 1, 4, emphasizedAccel, slide
    animation = fadeLayers, 1, 5, standard

    animation = windowsIn, 1, 5, emphasizedDecel
    animation = windowsOut, 1, 3, emphasizedAccel
    animation = windowsMove, 1, 6, standard
    animation = workspaces, 1, 5, standard

    animation = specialWorkspace, 1, 4, specialWorkSwitch, slidefadevert 15%
    animation = fade, 1, 6, standard
    animation = fadeDim, 1, 6, standard
    animation = border, 1, 6, standard
}

# --- WINDOW RULES & WORKSPACE RULES (CAELESTIA STYLE) ---
# Menggunakan angka opacity spesifik (0.88) sesuai setup kamu sebelumnya
#windowrule = opacity 0.88 0.88, match:fullscreen false

# Aturan smart gaps untuk jendela tunggal (Gaps out = 12)
workspace = w[tv1]s[false], gapsout:12

# --- PERINTAH AUTOSTART ---
exec-once = ags
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swaybg -i /home/firania/Downloads/miku.jpg -m fill
exec-once = gnome-terminal --title="JamWidget" -- sh -c "tty-clock -c -C 6 -s -B; exec zsh"
